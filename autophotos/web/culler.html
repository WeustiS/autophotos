<!doctype html><html><head><meta charset="utf-8"><title>autophotos · cull</title>
<style>
 :root{--bg:#0e1013;--pan:#15181d;--fg:#e9eaec;--mut:#878d97;--line:#262b33;--accent:#ffcf33;--ok:#39c46e}
 *{box-sizing:border-box}html,body{margin:0;height:100%}
 body{background:var(--bg);color:var(--fg);font:13px/1.45 system-ui,sans-serif;display:flex;flex-direction:column}
 #bar{display:flex;gap:10px;align-items:center;padding:8px 14px;background:var(--pan);border-bottom:1px solid var(--line);flex-wrap:wrap}
 #bar b{color:#fff}.tab{padding:4px 10px;border-radius:6px;cursor:pointer;color:var(--mut)}
 .tab.on{background:#222831;color:#fff}
 button{background:#222831;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:4px 9px;cursor:pointer}
 button:hover{border-color:#3a424d}
 #q{margin-left:auto;background:#222831;border:1px solid var(--line);color:var(--fg);border-radius:6px;padding:5px 9px;width:240px}
 #wrap{flex:1;overflow:auto;padding:12px}
 #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
 .cell{position:relative;background:#000;border:2px solid transparent;border-radius:6px;overflow:hidden;aspect-ratio:3/2;cursor:pointer}
 .cell img{width:100%;height:100%;object-fit:cover;display:block}
 .cell.sel{border-color:var(--accent)} .cell.rej{opacity:.4}
 .badge{position:absolute;left:5px;top:5px;background:#000a;border-radius:4px;padding:1px 6px;font-size:12px}
 .pk{position:absolute;right:5px;top:5px;font-size:13px}
 .qd{position:absolute;left:5px;bottom:18px;color:var(--ok);font-size:12px}
 .fn{position:absolute;left:0;right:0;bottom:0;background:#000a;font-size:10px;padding:2px 5px;color:#cfd3da;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .sc{position:absolute;right:5px;bottom:18px;font-size:10px;color:#9fe;background:#000a;border-radius:3px;padding:0 4px}
 #loupe{position:fixed;inset:0;background:#000e;display:none;align-items:center;justify-content:center;z-index:50}
 #lstage{position:relative;max-width:96%;max-height:92%}
 #lstage img{max-width:100%;max-height:92vh;display:block}
 .cropbox{position:absolute;border:2px solid var(--accent);box-shadow:0 0 0 9999px #0007;border-radius:2px}
 .croplbl{position:absolute;left:0;top:-18px;background:var(--accent);color:#000;font-size:11px;padding:0 5px;border-radius:3px}
 #lmeta{position:fixed;top:10px;left:14px;color:#fff}#lhelp{position:fixed;bottom:10px;left:14px;color:var(--mut)}
 .grp{margin-bottom:18px}.grp h4{margin:6px 0;color:#cfd3da;font-weight:600;display:flex;gap:8px;align-items:center}
 .grp .row{display:flex;gap:6px;overflow-x:auto}.grp .row img{height:120px;border-radius:4px}
 .kind{font-size:11px;color:#0e1013;background:var(--accent);border-radius:4px;padding:0 6px}
 .pickrow{display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid var(--line)}
 .pickrow img{height:56px;border-radius:4px}
 #help{color:var(--mut);font-size:12px;padding:4px 14px;background:var(--pan);border-top:1px solid var(--line)}
 #toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#222831;border:1px solid var(--line);padding:8px 14px;border-radius:8px;display:none;z-index:80}
</style></head><body>
<div id="bar">
 <b>autophotos</b><span id="lib" class="mut"></span>
 <span class="tab on" data-v="cull">Cull</span>
 <span class="tab" data-v="stacks">Stacks</span>
 <span class="tab" data-v="picks">Picks</span>
 <span class="tab" data-v="queue">Queue</span>
 <button id="byTaste" title="sort cull view by predicted taste">Sort: capture</button>
 <button id="train" title="train personal taste from your ratings">Train taste</button>
 <input id="q" placeholder="semantic search ↵">
</div>
<div id="wrap"><div id="grid"></div></div>
<div id="help">←/→ select · 1–5 stars · 0 clear · P pick · X reject · Q queue · C crops · Space loupe</div>
<div id="loupe"><div id="lmeta"></div><div id="lstage"><img id="limg"><div id="boxes"></div></div><div id="lhelp">C = toggle crop overlay · Esc = close</div></div>
<div id="toast"></div>
<script>
const API="";let photos=[],sel=0,view="cull",filter=null,sortTaste=false,reviewRank={};
const grid=document.getElementById('grid'),loupe=document.getElementById('loupe'),boxes=document.getElementById('boxes');
const toast=(m)=>{const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._);t._=setTimeout(()=>t.style.display='none',1800);};
const star=n=>n?'★'.repeat(n):'';
async function load(){
  const d=await (await fetch(API+"/api/photos")).json();
  photos=d.photos; document.getElementById('lib').textContent=" · "+d.library.split(/[\\/]/).pop()+" ("+d.count+")";
  render();
}
function curList(){
  let l=filter?photos.filter(p=>filter.has(p.hash)):photos.slice();
  if(sortTaste) l.sort((a,b)=>(reviewRank[b.hash]??-1e9)-(reviewRank[a.hash]??-1e9));
  return l;
}
function render(){({cull:renderCull,stacks:renderStacks,picks:renderPicks,queue:renderQueue}[view])();}
function cell(p,i){
  const c=document.createElement('div');c.className="cell"+(i===sel?" sel":"")+(p.pick===-1?" rej":"");
  const score=p.personal!=null?("you "+p.personal.toFixed(2)):(p.aesthetic!=null?("aes "+p.aesthetic.toFixed(2)):"");
  c.innerHTML=`<img loading=lazy src="${API}/api/thumb/${p.hash}">`+
    (p.rating?`<span class="badge">${star(p.rating)}</span>`:"")+
    (p.pick===1?`<span class="pk">✓</span>`:"")+(p.group?`<span class="pk" style="right:24px;color:#6cf">⛃</span>`:"")+
    (p.queued?`<span class="qd">▤ queued</span>`:"")+
    (score?`<span class="sc">${score}</span>`:"")+`<span class="fn">${p.filename}</span>`;
  c.onclick=()=>{sel=i;render();}; c.ondblclick=()=>openLoupe(p);
  return c;
}
function renderCull(){
  grid.style.display="grid";grid.innerHTML="";
  const l=curList(); l.forEach((p,i)=>grid.appendChild(cell(p,i)));
  const s=grid.children[sel]; if(s)s.scrollIntoView({block:"nearest"});
}
async function setRating(p,opt){
  const r=await (await fetch(API+"/api/rate?"+new URLSearchParams({hash:p.hash,...opt}),{method:"POST"})).json();
  Object.assign(p,{rating:r.rating.rating,pick:r.rating.pick,label:r.rating.label});render();
}
async function toggleQueue(p){
  const op=p.queued?"rm":"add";
  await fetch(API+"/api/queue?op="+op,{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify([p.hash])});
  p.queued=!p.queued; toast(p.queued?"queued for edit":"removed from queue"); render();
}
function openLoupe(p){loupe.style.display="flex";boxes.innerHTML="";loupe._p=p;loupe._crop=false;
  document.getElementById('limg').src=API+"/api/preview/"+p.hash;
  document.getElementById('lmeta').textContent=p.filename+"  "+star(p.rating||0)+
    (p.personal!=null?("  · you "+p.personal.toFixed(2)):"")+(p.aesthetic!=null?("  · aes "+p.aesthetic.toFixed(2)):"");}
async function toggleCrops(){
  const p=loupe._p; if(!p)return; loupe._crop=!loupe._crop; boxes.innerHTML="";
  if(!loupe._crop)return;
  const img=document.getElementById('limg'); const W=img.clientWidth,H=img.clientHeight;
  const d=await (await fetch(API+"/api/crops/"+p.hash+"?k=3")).json();
  d.crops.forEach((c,i)=>{const[x0,y0,x1,y1]=c.box;const b=document.createElement('div');b.className="cropbox";
    b.style.left=x0*W+"px";b.style.top=y0*H+"px";b.style.width=(x1-x0)*W+"px";b.style.height=(y1-y0)*H+"px";
    b.s
